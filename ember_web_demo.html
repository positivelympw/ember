<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember — Try the Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F4F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .demo-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      min-height: 600px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 22px;
      height: 22px;
    }
    .logo-ring {
      border-radius: 50%;
      border: 1px solid rgba(80,71,135,0.4);
      position: absolute;
    }
    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5047BF;
    }
    .header-title { font-size: 16px; font-weight: 500; color: #1a1a18; }
    .demo-badge {
      font-size: 9px;
      font-weight: 700;
      color: white;
      background: #5047BF;
      padding: 2px 6px;
      border-radius: 99px;
    }
    .header-sub { font-size: 12px; color: #888; margin-left: auto; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 360px;
      max-height: 360px;
    }
    .bubble-wrap { display: flex; align-items: flex-end; gap: 8px; }
    .bubble-wrap.user { flex-direction: row-reverse; }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(80,71,135,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar-dot { width: 8px; height: 8px; border-radius: 50%; background: #5047BF; }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
    }
    .bubble.ember {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      color: #1a1a18;
    }
    .bubble.user { background: #5047BF; color: white; }
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 14px;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 18px;
      width: fit-content;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(80,71,135,0.4);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }
    .lead-form {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      background: #f9f8f6;
    }
    .lead-input {
      flex: 1;
      padding: 8px 14px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 99px;
      background: #ffffff;
      font-size: 14px;
      color: #1a1a18;
      outline: none;
      font-family: inherit;
    }
    .lead-input::placeholder { color: #bbb; }
    .lead-input:focus { border-color: #5047BF; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #5047BF;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #3C3489; }
    .send-btn:disabled { background: #ddd; cursor: default; }
    .capture-bar {
      padding: 12px 16px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      background: rgba(80,71,135,0.04);
    }
    .capture-label { font-size: 12px; color: #666; margin-bottom: 6px; }
    .capture-row { display: flex; gap: 8px; }
    .capture-input {
      flex: 1;
      padding: 7px 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      background: #ffffff;
      font-size: 13px;
      color: #1a1a18;
      outline: none;
      font-family: inherit;
    }
    .capture-input:focus { border-color: #5047BF; }
    .capture-btn {
      padding: 7px 16px;
      background: #5047BF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .capture-btn:hover { background: #3C3489; }
    .success-bar {
      padding: 12px 16px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      background: rgba(29,158,117,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .success-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
    .success-text { font-size: 13px; color: #0F6E56; }
    .stats {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    .stat {
      flex: 1;
      background: #f5f4f0;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .stat-num { font-size: 18px; font-weight: 500; color: #1a1a18; }
    .stat-label { font-size: 11px; color: #888; margin-top: 1px; }
  </style>
</head>
<body>
<div class="demo-wrap">
  <div class="header">
    <div class="logo">
      <div class="logo-ring" style="width:22px;height:22px;opacity:0.3;"></div>
      <div class="logo-ring" style="width:14px;height:14px;opacity:0.6;"></div>
      <div class="logo-dot"></div>
    </div>
    <span class="header-title">ember</span>
    <span class="demo-badge">DEMO</span>
    <span class="header-sub" id="header-sub">Try it free</span>
  </div>

  <div class="messages" id="messages">
    <div class="bubble-wrap">
      <div class="avatar"><div class="avatar-dot"></div></div>
      <div class="bubble ember">What needs to get done?</div>
    </div>
  </div>

  <div id="input-area">
    <div class="lead-form">
      <input class="lead-input" id="chat-input" placeholder="Say something..." autocomplete="off" />
      <button class="send-btn" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M8 2l6 6-6 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="capture-section" style="display:none;" class="capture-bar">
      <div class="capture-label">Join the beta — drop your number or email</div>
      <div class="capture-row">
        <input class="capture-input" id="capture-input" placeholder="Phone or email" />
        <button class="capture-btn" id="capture-btn">Join waitlist</button>
      </div>
    </div>
    <div id="success-section" style="display:none;" class="success-bar">
      <div class="success-dot"></div>
      <div class="success-text" id="success-text">You're on the list. We'll be in touch.</div>
    </div>
  </div>

  <div class="stats" id="stats-bar" style="display:none;">
    <div class="stat"><div class="stat-num" id="stat-msgs">0</div><div class="stat-label">messages sent</div></div>
    <div class="stat"><div class="stat-num" id="stat-leads">0</div><div class="stat-label">beta signups</div></div>
    <div class="stat"><div class="stat-num" id="stat-sessions">1</div><div class="stat-label">active sessions</div></div>
  </div>
</div>

<script>
  const PROXY_URL = 'https://api.anthropic.com/v1/messages';
  const API_KEY = 'YOUR_API_KEY_HERE';

  const SYSTEM = `You are Ember — an organization leader embedded in a group coordination platform.
You are running as a web demo to show potential users what Ember can do.
Your persona: empathetic and action-oriented. Always resolve situations. Never leave threads open.
Be warm, specific, and brief — 2 sentences maximum unless complexity requires more.
Never say "reach out", "touch base", or "circle back".
After 2-3 exchanges, naturally mention that Ember is available as an iOS app and invite them to join the beta.
Never be pushy about it — weave it in naturally when relevant.`;

  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const messagesEl = document.getElementById('messages');
  const captureSection = document.getElementById('capture-section');
  const successSection = document.getElementById('success-section');
  const captureBtn = document.getElementById('capture-btn');
  const captureInput = document.getElementById('capture-input');
  const statsBar = document.getElementById('stats-bar');
  const headerSub = document.getElementById('header-sub');

  let history = [];
  let msgCount = 0;
  let leadCount = 0;
  let captureShown = false;

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(text, isUser) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap' + (isUser ? ' user' : '');
    if (!isUser) {
      const av = document.createElement('div');
      av.className = 'avatar';
      av.innerHTML = '<div class="avatar-dot"></div>';
      wrap.appendChild(av);
    }
    const b = document.createElement('div');
    b.className = 'bubble ' + (isUser ? 'user' : 'ember');
    b.textContent = text;
    wrap.appendChild(b);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    wrap.id = 'typing-wrap';
    const av = document.createElement('div');
    av.className = 'avatar';
    av.innerHTML = '<div class="avatar-dot"></div>';
    wrap.appendChild(av);
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(t);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }

  function updateStats() {
    document.getElementById('stat-msgs').textContent = msgCount;
    document.getElementById('stat-leads').textContent = leadCount;
    if (msgCount > 0) statsBar.style.display = 'flex';
  }

  function maybeShowCapture() {
    if (!captureShown && msgCount >= 3) {
      captureShown = true;
      captureSection.style.display = 'block';
    }
  }

  input.addEventListener('input', () => {
    sendBtn.disabled = input.value.trim().length === 0;
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && input.value.trim()) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendBtn.disabled = true;
    addBubble(text, true);
    history.push({ role: 'user', content: text });
    msgCount++;
    updateStats();
    showTyping();
    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          system: SYSTEM,
          messages: history
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'Something went wrong. Try again?';
      removeTyping();
      addBubble(reply, false);
      history.push({ role: 'assistant', content: reply });
      headerSub.textContent = msgCount + ' messages';
      maybeShowCapture();
    } catch {
      removeTyping();
      addBubble('Something went wrong. Try again?', false);
    }
  }

  captureBtn.addEventListener('click', () => {
    const val = captureInput.value.trim();
    if (!val) return;
    leadCount++;
    captureSection.style.display = 'none';
    successSection.style.display = 'flex';
    document.getElementById('success-text').textContent =
      "You're on the list. We'll reach out at " + val + ".";
    updateStats();
    addBubble("I'd like to join the beta — " + val, true);
    history.push({ role: 'user', content: 'I want to join the beta. My contact is: ' + val });
    showTyping();
    fetch(PROXY_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 500,
        system: SYSTEM,
        messages: history
      })
    }).then(r => r.json()).then(data => {
      removeTyping();
      const reply = data.content?.[0]?.text || "Welcome to the Ember beta. We'll be in touch.";
      addBubble(reply, false);
      history.push({ role: 'assistant', content: reply });
    }).catch(() => {
      removeTyping();
      addBubble("Welcome to the Ember beta. We'll be in touch.", false);
    });
  });
</script>
</body>
</html>
